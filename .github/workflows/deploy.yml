name: Go Deploy

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Go Build and Test"]
    types: [completed]
  workflow_dispatch: # Allows manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: development
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.x' # Use the latest Go 1.x version

      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build application
        run: go build -o myapp -v ./... # Builds a binary named 'myapp'

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-binary
          path: myapp

